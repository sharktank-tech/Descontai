{% extends "base.html" %}

{% block title %}Gerenciar Categorias - DescontAí.com{% endblock %}

{% block content %}
<header class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8 text-center">
  <h1 class="text-4xl sm:text-5xl font-extrabold text-yellow-400 tracking-tight mb-2">
    Gerenciar <span class="text-gray-900 dark:text-white">Categorias</span>
  </h1>
  <p class="text-base sm:text-lg text-gray-600 dark:text-gray-300">
    Adicione, edite ou remova categorias de produtos.
  </p>
</header>

<!-- Botão para adicionar nova categoria -->
<div class="max-w-4xl mx-auto text-right px-4 sm:px-6 lg:px-8 mb-6">
  <a href="#"
     class="inline-block bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 rounded">
    + Nova Categoria
  </a>
</div>

<!-- Tabela de categorias -->
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
  <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
      <thead class="bg-gray-50 dark:bg-gray-700">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">ID</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Categoria</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Produtos</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-300 uppercase tracking-wider">Ações</th>
        </tr>
      </thead>
      <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
        <!-- Exemplo de linha - substituir por loop real -->
        <tr>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 dark:text-white">1</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 dark:text-white">Eletrônicos</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 dark:text-gray-300">42</td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <a href="#"
               class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 mr-4">Editar</a>
            <form method="POST" action="#" style="display:inline;" onsubmit="return confirm('Tem certeza que deseja excluir esta categoria?');">
              <button type="submit" class="text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300">
                Excluir
              </button>
            </form>
          </td>
        </tr>
        <!-- Fim exemplo -->
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
