{% extends "base.html" %}

{% block title %}Editar Categoria - DescontAí.com{% endblock %}

{% block content %}
<header class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8 text-center">
  <h1 class="text-4xl sm:text-5xl font-extrabold text-yellow-400 tracking-tight mb-2">
    Editar <span class="text-gray-900 dark:text-white">Categoria</span>
  </h1>
</header>

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
  <div class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
    <form method="POST" action="{{ url_for('admin.edit_category', id=categoria.id) }}">
      <div class="mb-4">
        <label for="nome" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Nome da Categoria*</label>
        <input type="text" id="nome" name="nome" value="{{ categoria.nome }}" required
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 dark:bg-gray-700 dark:text-white">
      </div>

      <div class="mb-4">
        <label for="descricao" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Descrição</label>
        <textarea id="descricao" name="descricao" rows="3"
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 dark:bg-gray-700 dark:text-white">{{ categoria.descricao or '' }}</textarea>
      </div>

      <div class="mb-4">
        <div class="flex items-center">
          <input type="checkbox" id="ativa" name="ativa" {% if categoria.ativa %}checked{% endif %}
                 class="h-4 w-4 text-yellow-600 focus:ring-yellow-500 border-gray-300 rounded">
          <label for="ativa" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">Categoria ativa</label>
        </div>
      </div>

      <div class="flex items-center justify-end gap-4">
        <a href="{{ url_for('admin.manage_categories') }}"
           class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">
          Cancelar
        </a>
        <button type="submit"
                class="px-4 py-2 border border-transparent rounded-md shadow-sm text-white bg-yellow-500 hover:bg-yellow-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500">
          Atualizar Categoria
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
