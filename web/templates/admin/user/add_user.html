{% extends "base.html" %}

{% block title %}Adicionar Produto - DescontAí.com{% endblock %}

{% block content %}
<header class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8 text-center">
  <h1 class="text-4xl sm:text-5xl font-extrabold text-yellow-400 tracking-tight mb-2">
    Adicionar <span class="text-gray-900 dark:text-white">Produto</span>
  </h1>
  <p class="text-base sm:text-lg text-gray-600 dark:text-gray-300">
    Preencha os detalhes do novo produto.
  </p>
</header>

<!-- Formulário para adicionar novo produto -->
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
  <div class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
    <form method="POST" action="{{ url_for('admin.add_product') }}">
      <div class="mb-4">
        <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Nome do Produto</label>
        <input type="text" id="name" name="name" required
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 dark:bg-gray-700 dark:text-white">
      </div>

      <div class="mb-4">
        <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Descrição</label>
        <textarea id="description" name="description" rows="3" required
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 dark:bg-gray-700 dark:text-white"></textarea>
      </div>

      <div class="mb-4">
        <label for="price" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Preço</label>
        <input type="number" id="price" name="price" step="0.01" min="0" required
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 dark:bg-gray-700 dark:text-white">
      </div>

      <div class="mb-6">
        <label for="image_url" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">URL da Imagem (opcional)</label>
        <input type="url" id="image_url" name="image_url"
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500 dark:bg-gray-700 dark:text-white">
      </div>

      <div class="flex items-center justify-end gap-4">
        <a href="{{ url_for('admin.admin_dashboard') }}"
           class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">
          Cancelar
        </a>
        <button type="submit"
                class="px-4 py-2 border border-transparent rounded-md shadow-sm text-white bg-yellow-500 hover:bg-yellow-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500">
          Adicionar Produto
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
