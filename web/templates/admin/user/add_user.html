{% extends "base.html" %}

{% block title %}Adicionar Usuário - DescontAí.com{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
  <h1 class="text-3xl font-bold text-yellow-500 mb-6 text-center">
    Adicionar <span class="text-gray-900 dark:text-white">Novo Usuário</span>
  </h1>

  <form method="POST" action="{{ url_for('admin.add_user') }}" class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md space-y-6">
    <div>
      <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Nome de Usuário</label>
      <input type="text" id="username" name="username" required
             placeholder="Digite o nome do usuário"
             class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-yellow-500 focus:border-yellow-500 sm:text-sm" />
    </div>

    <div>
      <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email</label>
      <input type="email" id="email" name="email" required
             placeholder="email@exemplo.com"
             class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-yellow-500 focus:border-yellow-500 sm:text-sm" />
    </div>

    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Senha</label>
      <input type="password" id="password" name="password" required
             placeholder="Digite a senha"
             class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:ring-yellow-500 focus:border-yellow-500 sm:text-sm" />
    </div>

    <div class="flex justify-between">
      <a href="{{ url_for('admin.admin_user') }}" class="text-sm text-gray-600 hover:text-yellow-500 dark:text-gray-400 dark:hover:text-yellow-400">
        ← Voltar
      </a>
      <button type="submit" class="bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 rounded">
        Adicionar Usuário
      </button>
    </div>
  </form>
</div>
{% endblock %}
