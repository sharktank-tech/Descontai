<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="{{ url_for('static', filename='img/cupom.png') }}" type="image/png">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <!-- Card de Registro -->
  <div class="bg-white shadow-lg rounded-lg p-8 max-w-md w-full">
    <h1 class="text-4xl sm:text-5xl font-extrabold text-yellow-400 tracking-tight mb-2 text-center">
      Descont<span class="text-gray-900">Aí.com</span>
    </h1>
    <p class="text-gray-600 text-center mb-6">Crie sua conta</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="mb-4 space-y-2">
        {% for category, message in messages %}
          <div
            class="
              px-4 py-3 rounded-lg text-sm font-medium
              {% if category == 'success' %}
                bg-green-100 text-green-800 border border-green-300
              {% elif category == 'danger' %}
                bg-red-100 text-red-800 border border-red-300
              {% elif category == 'warning' %}
                bg-yellow-100 text-yellow-800 border border-yellow-300
              {% else %}
                bg-gray-100 text-gray-800 border border-gray-300
              {% endif %}
            "
          >
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
    {% endwith %}

    <!-- Formulário -->
    <form action="{{ url_for('main.register') }}" method="POST" class="space-y-4">
      <!-- Nome de Usuário -->
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700">Nome de Usuário</label>
        <input
          type="text"
          id="username"
          name="username"
          class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
          placeholder="Digite seu nome de usuário"
          required>
      </div>

      <!-- E-mail -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
          placeholder="seuemail@email.com"
          required>
      </div>

      <!-- Senha -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
          placeholder="Crie uma senha"
          required>
      </div>

      <!-- Confirmar Senha -->
      <div>
        <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirmar Senha</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
          placeholder="Confirme sua senha"
          required>
      </div>

      <!-- Botão de Registro -->
      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg font-medium text-lg hover:bg-blue-700 transition">
        Registrar
      </button>
    </form>

    <!-- Separador -->
    <div class="flex items-center my-6">
      <div class="border-t border-gray-300 flex-grow"></div>
      <span class="text-gray-500 mx-4">ou</span>
      <div class="border-t border-gray-300 flex-grow"></div>
    </div>

    <!-- Registro com redes sociais -->
    <div class="flex flex-col space-y-4">
      <!-- Google -->
      <a href="#"
         class="w-full flex items-center justify-center bg-gray-100 py-2 px-4 rounded-lg shadow hover:bg-gray-200 transition">
        <img src="https://imgs.search.brave.com/bEoj9oydlm4QEA8KUuZr6L0akwRrZS994IzB_SoAdpw/rs:fit:500:0:0:0/g:ce/aHR0cHM6Ly9jZG4u/dmVjdG9yc3RvY2su/Y29tL2kvcHJldmll/dy0xeC83NS81NC9n/b29nbGUtbG9nby12/ZWN0b3ItMjgzODc1/NTQuanBn"
             alt="Google" class="w-5 h-5 mr-2">
        Registrar com Google
      </a>

      <!-- Facebook (desativado por enquanto) -->
      <button disabled class="w-full flex items-center justify-center bg-gray-100 py-2 px-4 rounded-lg shadow text-gray-400 cursor-not-allowed">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg"
             alt="Facebook" class="w-5 h-5 mr-2">
        Em breve com Facebook
      </button>
    </div>

    <!-- Rodapé -->
    <p class="text-gray-600 text-sm text-center mt-6">
      Já tem uma conta? <a href="{{ url_for('main.login') }}" class="text-blue-600 hover:underline">Faça login</a>
    </p>
  </div>

</body>
</html>
