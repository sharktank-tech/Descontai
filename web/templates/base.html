<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Buscador de Descontos da Amazon 🏷️{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="{{ url_for('static', filename='img/cupom.png') }}" type="image/png">
</head>
<body class="min-h-screen flex flex-col bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white">

  <!-- Barra de navegação -->
  <header class="bg-gray-800 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-yellow-400 hover:text-yellow-300">DescontAí</a>
      <nav class="space-x-4 text-sm">
        <a href="/" class="hover:text-yellow-400">Início</a>
        <a href="/post" class="hover:text-yellow-400">Ofertas</a>
        <a href="/sobre" class="hover:text-yellow-400">Sobre</a>
        <a href="/contato" class="hover:text-yellow-400">Contato</a>
      </nav>
    </div>
  </header>

  <!-- Conteúdo principal -->
  <main class="flex-grow">
    {% block content %}{% endblock %}
  </main>

  <!-- Rodapé fixo ao fim -->
  <footer class="bg-gray-800 text-gray-300 py-8 mt-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="text-center sm:text-left">
          <p class="text-sm">&copy; 2025 DescontAí.com – Todos os direitos reservados.</p>
          <p class="text-xs mt-1">Compras via links afiliados ajudam a manter o projeto ativo.</p>
        </div>
        <div class="text-center sm:text-right">
          <p class="text-sm">
            Ícones por
            <a href="https://www.flaticon.com/authors/pixel-perfect" class="underline text-yellow-400 hover:text-yellow-500" target="_blank">
              Pixel perfect - Flaticon
            </a>
          </p>
        </div>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="{{ url_for('static', filename='scripts/script.js') }}"></script>
</body>
</html>
